<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalyPay Sandbox - Test de paiement</title>

    <!-- SDK officiel -->
    <script src="https://talypay-me.com/js-sdk/talypay-sdk.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .card{
            width:100%;
            max-width:470px;
            background:white;
            border-radius:12px;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
            padding:30px;
        }

        h2{
            margin-bottom:8px;
        }

        .subtitle{
            color:#666;
            margin-bottom:25px;
        }

        .badge{
            display:inline-block;
            background:#FFF3CD;
            color:#856404;
            padding:7px 14px;
            border-radius:30px;
            margin-bottom:18px;
            font-size:13px;
            font-weight:bold;
        }

        label{
            display:block;
            margin-top:16px;
            margin-bottom:6px;
            font-weight:bold;
        }

        input,
        select{
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:8px;
            font-size:15px;
        }

        button{
            width:100%;
            margin-top:28px;
            padding:14px;
            background:#0057d9;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
            font-weight:bold;
        }

        button:disabled{
            opacity:.6;
            cursor:not-allowed;
        }

        #status{
            display:none;
            margin-top:20px;
            padding:15px;
            border-radius:8px;
        }

        .pending{
            display:block;
            background:#e8f1ff;
            color:#0057d9;
        }

        .success{
            display:block;
            background:#d1fae5;
            color:#065f46;
        }

        .error{
            display:block;
            background:#fde2e1;
            color:#b42318;
        }

        .hint{
            font-size:12px;
            color:#777;
            margin-top:5px;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="badge">🧪 Mode Sandbox</div>

    <h2>Test TalyPay</h2>

    <div class="subtitle">
        Paiement Mobile Money en environnement de test.
    </div>

    <form id="payment-form">

        <label>Nom</label>
        <input
            id="name"
            value="AKOSSOU"
            required>

        <label>Prénom</label>
        <input
            id="firstname"
            value="Francinne">

        <label>Email</label>
        <input
            id="email"
            type="email"
            value="francinne@test.com"
            required>

        <label>Téléphone</label>

        <input
            id="phone"
            value="229019000000"
            required>

        <div class="hint">
            Numéro Sandbox fourni par TalyPay
        </div>

        <label>Montant (FCFA)</label>

        <input
            id="amount"
            type="number"
            value="1000"
            min="100"
            required>

        <label>Moyen de paiement</label>

        <select id="mode">
            <option value="mtn_momo">MTN Mobile Money</option>
            <option value="moov_money">Moov Money</option>
            <option value="celtiis_money">Celtiis Money</option>
            <option value="card">Carte bancaire</option>
        </select>

        <button id="submitBtn">
            Payer maintenant
        </button>

    </form>

    <div id="status"></div>

</div>

<script>

if(typeof TalyPay==="undefined"){

    alert("Le SDK TalyPay ne s'est pas chargé.");

    throw new Error("SDK introuvable");

}

const btn=document.getElementById("submitBtn");

const status=document.getElementById("status");

function showStatus(type,message){

    status.className=type;

    status.innerHTML=message;

}

const talypay=new TalyPay(

"tk_test_QjTiAe7QK70vVxDWLC4TBKGz3cQdJJPQogNP0p3m9eCQPRGGpC8hWnolDa0cWhvj",

{

sandbox:true,

maxStatusCheckAttempts:60,

onPending:(data)=>{

    console.log(data);

    showStatus(
        "pending",
        `⏳ Vérification ${data.attempt}/${data.max_attempts}...`
    );

},

onSuccess:(response)=>{

    console.log(response);

    showStatus(
        "success",
        `✅ Paiement confirmé.<br><br>
        Référence : <b>${response.payment_ref}</b>`
    );

    btn.disabled=false;

    btn.innerHTML="Payer maintenant";

},

onError:(error)=>{

    console.error(error);

    showStatus(
        "error",
        "❌ "+(error.message||"Erreur inconnue")
    );

    btn.disabled=false;

    btn.innerHTML="Payer maintenant";

}

}

);

document.getElementById("payment-form")

.addEventListener("submit",async(e)=>{

e.preventDefault();

btn.disabled=true;

btn.innerHTML="Traitement...";

showStatus(
"pending",
"⏳ Initialisation du paiement..."
);

try{

await talypay.initPayment({

payment_mode:document.getElementById("mode").value,

customer_name:document.getElementById("name").value,

customer_firstname:document.getElementById("firstname").value,

customer_email:document.getElementById("email").value,

customer_tel:document.getElementById("phone").value,

amount:Number(document.getElementById("amount").value),

currency:"XOF",

country:"benin",

payment_ref:"ORDER-"+Date.now(),

description:"Paiement Sandbox",

callback_url:"",

metadata:{}

},true);

}
catch(error){

console.error(error);

showStatus(
"error",
"❌ "+(error.message||JSON.stringify(error))
);

btn.disabled=false;

btn.innerHTML="Payer maintenant";

}

});

</script>

</body>
</html>
